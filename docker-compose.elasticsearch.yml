# Локальный Elasticsearch для логов бэкенда.
# Запуск: docker compose -f docker-compose.elasticsearch.yml up -d
# В .env задать: ELASTICSEARCH_URL=http://localhost:9200
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
volumes:
  elasticsearch-data:
